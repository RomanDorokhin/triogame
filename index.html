<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TAP BEATS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   TAP BEATS — Full Rhythm Game
   3 lanes · PERFECT/GREAT/GOOD/MISS · Combo multiplier · Health
   Difficulty selection · Grade system · Beat-synced spawning
═══════════════════════════════════════════════════════════════ */

const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H, HY, LW, LX, NR;

function resize() {
  W = c.width  = window.innerWidth;
  H = c.height = window.innerHeight;
  HY = H * 0.82;
  LW = W / 3;
  LX = [LW * 0.5, LW * 1.5, LW * 2.5];
  NR = Math.max(16, Math.min(LW * 0.25, 28));
}
resize();
window.addEventListener('resize', resize);

/* ── Palette ── */
const LC  = ['#ff2d78', '#00d4ff', '#9945ff'];
const LR  = ['255,45,120', '0,212,255', '153,69,255'];

/* ── BPM ── */
const BPM  = 128;
const BEAT = 60000 / BPM; // 468.75 ms

/* ── Difficulties ── */
const DC = {
  easy: { travel: 2100, col: '#00ff88', lbl: 'ЛЕГКО'      },
  norm: { travel: 1650, col: '#00d4ff', lbl: 'НОРМАЛЬНО'  },
  hard: { travel: 1050, col: '#ff2d78', lbl: 'СЛОЖНО'     },
};

/* ── Judgments (max-distance px from HY) ── */
const JD = [
  { nm: 'PERFECT', md: 22, pt: 300, cl: '#ffd700', hp:  3 },
  { nm: 'GREAT',   md: 44, pt: 200, cl: '#00d4ff', hp:  1 },
  { nm: 'GOOD',    md: 66, pt: 100, cl: '#00ff88', hp:  0 },
];

/* ── Note patterns [beat, lane] × 16-beat loop ── */
const PAT = {
  easy: [
    [0,1],[2,0],[4,2],[6,1],
    [8,0],[10,2],[12,1],[14,0],
  ],
  norm: [
    [0,0],[1,2],[2,1],[3,0],
    [4,2],[4.5,0],[5,1],[6,2],[7,1],
    [8,0],[8.5,2],[9,1],[9.5,0],
    [10,2],[11,1],[11.5,0],
    [12,0],[12.33,1],[12.67,2],
    [13,1],[14,0],[14.5,2],[15,1],[15.5,0],
  ],
  hard: [
    [0,0],[0.25,1],[0.5,2],[0.75,1],
    [1,0],[1.5,2],[1.75,0],
    [2,1],[2.5,2],[2.75,0],
    [3,1],[3.5,0],[3.75,2],
    [4,0],[4.5,1],[4.75,2],
    [5,0],[5.25,2],[5.5,1],
    [6,1],[6.25,0],[6.5,2],
    [7,0],[7.25,2],[7.5,1],[7.75,0],
    [8,2],[8.5,0],[8.75,1],
    [9,1],[9.5,2],[9.75,0],
    [10,0],[10.33,1],[10.67,2],
    [11,1],[11.5,0],[11.75,2],
    [12,0],[12.5,1],[12.75,2],
    [13,1],[13.5,2],[13.75,0],
    [14,0],[14.5,1],[14.75,2],
    [15,2],[15.33,0],[15.67,1],
  ],
};

/* ── State ── */
let st = 'menu'; // menu | play | pause | results
let diff = 'norm';
let score, combo, maxCombo, perf, grt, gd, miss, hp;
let notes = [], parts = [], floats = [];
let flash = [0, 0, 0];
let shake = 0, beatPulse = 0;
let sched = [], schedI = 0;
let gStart = 0;
const SONG   = 120000; // 2 min
const LEAD   = 4;      // beat lead-in
const LOOPS  = 24;
const best   = { easy: 0, norm: 0, hard: 0 };
const mBtns  = {};
let pauseT   = 0; // timestamp when paused

/* ═══════════════════════════════════════════════════════════════
   INIT / SCHEDULE
═══════════════════════════════════════════════════════════════ */

function initGame(d) {
  diff = d; st = 'play';
  score = combo = maxCombo = perf = grt = gd = miss = 0;
  hp = 65;
  notes = []; parts = []; floats = [];
  flash = [0, 0, 0];
  shake = beatPulse = 0;
  schedI = 0;
  gStart = performance.now();
  buildSched(d);
}

function buildSched(d) {
  const pat = PAT[d], lb = 16;
  sched = [];
  for (let L = 0; L < LOOPS; L++) {
    for (const [b, lane] of pat) {
      sched.push({ ht: gStart + (LEAD + L * lb + b) * BEAT, lane });
    }
  }
  sched.sort((a, b) => a.ht - b.ht);
}

/* ═══════════════════════════════════════════════════════════════
   SPAWN / UPDATE
═══════════════════════════════════════════════════════════════ */

function spawnNotes(t) {
  const tr = DC[diff].travel;
  while (schedI < sched.length) {
    const s = sched[schedI];
    if (s.ht - tr > t + 70) break;
    notes.push({ lane: s.lane, ht: s.ht, y: 0, st: 'f', a: 1 });
    schedI++;
  }
}

function updNotes(t) {
  const tr = DC[diff].travel;
  for (let i = notes.length - 1; i >= 0; i--) {
    const n = notes[i];
    if (n.st === 'f') {
      n.y = ((t - (n.ht - tr)) / tr) * HY;
      if (n.y > HY + JD[2].md + NR + 14) doMiss(n);
    } else if (n.st === 'h') {
      n.y -= 2.5; n.a -= 0.07;
      if (n.a <= 0) notes.splice(i, 1);
    } else if (n.st === 'm') {
      n.a -= 0.055;
      if (n.a <= 0) notes.splice(i, 1);
    }
  }
}

function doMiss(n) {
  if (n.st !== 'f') return;
  n.st = 'm'; combo = 0; miss++;
  hp = Math.max(0, hp - 16);
  shake = Math.max(shake, 9);
  spawnParts(LX[n.lane], HY + 6, '#ff4466', 5, false);
  addFloat(LX[n.lane], HY - 58, 'MISS', '#ff4466');
  if (hp <= 0) setTimeout(() => { saveBest(); st = 'results'; }, 360);
}

/* ═══════════════════════════════════════════════════════════════
   TAP / HIT
═══════════════════════════════════════════════════════════════ */

function tap(lane) {
  flash[lane] = 1;
  if (st === 'results') { st = 'menu'; return; }
  if (st === 'pause')   { resume(); return; }
  if (st !== 'play')    return;

  let best = null, bestD = Infinity;
  const maxD = JD[2].md + NR;
  for (const n of notes) {
    if (n.lane !== lane || n.st !== 'f') continue;
    const d = Math.abs(n.y - HY);
    if (d < maxD && d < bestD) { best = n; bestD = d; }
  }

  if (!best) {
    addFloat(LX[lane], HY - 42, '×', 'rgba(255,80,80,.7)');
    return;
  }

  let j = null;
  for (const jd of JD) if (bestD <= jd.md) { j = jd; break; }
  if (!j) return;

  best.st = 'h'; best.a = 1;
  const mult = Math.max(1, 1 + Math.floor(combo / 20));
  score += j.pt * mult;
  combo++; maxCombo = Math.max(maxCombo, combo);
  hp = Math.min(100, hp + j.hp);
  if (j.nm === 'PERFECT') perf++;
  else if (j.nm === 'GREAT') grt++;
  else gd++;

  spawnParts(LX[lane], HY, LC[lane], j.nm === 'PERFECT' ? 20 : 10, j.nm === 'PERFECT');
  addFloat(LX[lane], HY - 58, j.nm, j.cl);
  if (combo >= 20 && combo % 10 === 0) spawnComboFlare(combo);
}

/* ═══════════════════════════════════════════════════════════════
   PARTICLES / FLOATS
═══════════════════════════════════════════════════════════════ */

function spawnParts(x, y, col, n, perfect) {
  for (let i = 0; i < n; i++) {
    const a  = (i / n) * Math.PI * 2 + Math.random() * 0.5;
    const sp = perfect ? (4 + Math.random() * 5) : (1.5 + Math.random() * 3);
    parts.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp-(perfect?2:1),
      r: perfect?(2+Math.random()*3):(1.5+Math.random()*2), col, a: 1, l: 0, ml: perfect?52:36 });
  }
  if (perfect) {
    for (let i = 0; i < 7; i++) {
      parts.push({ x: x+(Math.random()-.5)*55, y: y+(Math.random()-.5)*30,
        vx: (Math.random()-.5)*2, vy: -Math.random()*4-1,
        r: 1+Math.random()*2.5, col: '#ffd700', a: 1, l: 0, ml: 58 });
    }
  }
}

function spawnComboFlare(combo) {
  const hue = (combo * 7) % 360;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    parts.push({ x: W/2, y: H/2, vx: Math.cos(a)*6, vy: Math.sin(a)*6,
      r: 3, col: `hsl(${hue},100%,65%)`, a: 1, l: 0, ml: 45 });
  }
}

function updParts() {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.vx *= 0.95;
    p.a = 1 - (++p.l) / p.ml;
    if (p.a <= 0) parts.splice(i, 1);
  }
}

function addFloat(x, y, txt, col) { floats.push({ x, y, txt, col, a: 1, vy: -1.6 }); }

function updFloats() {
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i]; f.y += f.vy; f.a -= 0.024;
    if (f.a <= 0) floats.splice(i, 1);
  }
}

/* ═══════════════════════════════════════════════════════════════
   PAUSE / RESUME
═══════════════════════════════════════════════════════════════ */

function pause() {
  if (st !== 'play') return;
  st = 'pause'; pauseT = performance.now();
}

function resume() {
  if (st !== 'pause') return;
  const gap = performance.now() - pauseT;
  gStart += gap;
  for (const s of sched) s.ht += gap;
  for (const n of notes) n.ht += gap;
  st = 'play';
}

function saveBest() {
  best[diff] = Math.max(best[diff], score);
}

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */

function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

/* ═══════════════════════════════════════════════════════════════
   DRAW — BACKGROUND
═══════════════════════════════════════════════════════════════ */

function drawBG(t) {
  ctx.fillStyle = '#05050a'; ctx.fillRect(0, 0, W, H);

  if (st === 'play' || st === 'pause') {
    const bp = ((t - gStart) % BEAT) / BEAT;
    beatPulse = Math.max(0, 1 - bp * 3.6);
    for (let l = 0; l < 3; l++) {
      const g = ctx.createLinearGradient(l*LW, 0, (l+1)*LW, 0);
      g.addColorStop(0, 'transparent');
      g.addColorStop(0.5, `rgba(${LR[l]},${0.022 + beatPulse * 0.08})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fillRect(l*LW, 0, LW, H);
    }
  }

  // Moving grid
  const gs = 54, go = (t * 0.032) % gs;
  ctx.strokeStyle = 'rgba(255,255,255,.03)'; ctx.lineWidth = 1;
  for (let y = go; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  for (let x = 0; x < W; x += gs)  { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
}

/* ── Lanes ── */
function drawLanes() {
  for (let i = 1; i < 3; i++) {
    ctx.strokeStyle = 'rgba(255,255,255,.09)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(i*LW, 0); ctx.lineTo(i*LW, H); ctx.stroke();
  }
  ctx.fillStyle = 'rgba(0,0,0,.42)';
  ctx.fillRect(0, HY + NR*1.9, W, H - HY - NR*1.9);

  for (let l = 0; l < 3; l++) {
    if (flash[l] > 0) {
      ctx.fillStyle = `rgba(${LR[l]},${flash[l] * 0.16})`;
      ctx.fillRect(l*LW, 0, LW, H);
      flash[l] = Math.max(0, flash[l] - 0.1);
    }
  }
}

/* ── Hit zones ── */
function drawHitZones(t) {
  for (let l = 0; l < 3; l++) {
    const x = LX[l], col = LC[l], rgb = LR[l];
    const pulse = Math.sin(t / 230 + l * 1.3) * 3;

    ctx.beginPath(); ctx.arc(x, HY, NR + 11 + pulse, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${rgb},.2)`; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.beginPath(); ctx.arc(x, HY, NR + 4, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${rgb},.7)`; ctx.lineWidth = 2.5;
    ctx.shadowColor = col; ctx.shadowBlur = 12;
    ctx.stroke(); ctx.shadowBlur = 0;

    const g = ctx.createRadialGradient(x, HY, 0, x, HY, NR);
    g.addColorStop(0, `rgba(${rgb},.14)`); g.addColorStop(1, `rgba(${rgb},.04)`);
    ctx.beginPath(); ctx.arc(x, HY, NR, 0, Math.PI*2);
    ctx.fillStyle = g; ctx.fill();

    ctx.font = `bold ${Math.round(NR * 0.52)}px Orbitron,monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(${rgb},.4)`;
    ctx.fillText(['A','S','D'][l], x, HY);
  }
}

/* ── Notes ── */
function drawNotes() {
  for (const n of notes) {
    ctx.globalAlpha = n.a;
    const x = LX[n.lane], col = LC[n.lane], rgb = LR[n.lane];
    ctx.shadowColor = col;

    if (n.st === 'h') {
      const p = 1 - n.a;
      ctx.shadowBlur = 14 * n.a;
      ctx.beginPath(); ctx.arc(x, n.y, NR + p * NR * 2.5, 0, Math.PI*2);
      ctx.strokeStyle = col; ctx.lineWidth = 3 * n.a; ctx.stroke();
    } else if (n.st === 'm') {
      ctx.shadowBlur = 8;
      ctx.fillStyle = `rgba(255,68,100,${n.a * 0.8})`;
      ctx.beginPath(); ctx.arc(x, n.y, NR * 0.65, 0, Math.PI*2); ctx.fill();
    } else {
      const dist = HY - n.y;
      if (dist > 0 && dist < H * 0.55) {
        ctx.globalAlpha = n.a * 0.28;
        ctx.strokeStyle = col; ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 7]);
        ctx.beginPath(); ctx.moveTo(x, n.y + NR); ctx.lineTo(x, n.y + Math.min(dist * 0.5, 80)); ctx.stroke();
        ctx.setLineDash([]); ctx.globalAlpha = n.a;
      }

      ctx.shadowBlur = 18;
      const g = ctx.createRadialGradient(x, n.y, 0, x, n.y, NR);
      g.addColorStop(0, '#fff');
      g.addColorStop(0.3, col);
      g.addColorStop(1, `rgba(${rgb},.22)`);
      ctx.beginPath(); ctx.arc(x, n.y, NR, 0, Math.PI*2);
      ctx.fillStyle = g; ctx.fill();

      ctx.shadowBlur = 4;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(x, n.y, NR * 0.22, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
}

/* ── Particles ── */
function drawParts() {
  for (const p of parts) {
    ctx.globalAlpha = p.a;
    ctx.fillStyle = p.col; ctx.shadowColor = p.col; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

/* ── Floating texts ── */
function drawFloats() {
  for (const f of floats) {
    ctx.globalAlpha = f.a;
    ctx.fillStyle = f.col; ctx.shadowColor = f.col; ctx.shadowBlur = 10;
    ctx.font = `bold ${Math.round(W * 0.042)}px Orbitron,monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

/* ── HUD ── */
function drawHUD(t) {
  const elapsed = t - gStart;

  // Song progress bar (very top)
  const prog = Math.min(1, elapsed / SONG);
  ctx.fillStyle = 'rgba(255,255,255,.07)'; ctx.fillRect(0, 0, W, 3);
  ctx.fillStyle = DC[diff].col; ctx.shadowColor = DC[diff].col; ctx.shadowBlur = 6;
  ctx.fillRect(0, 0, W * prog, 3); ctx.shadowBlur = 0;

  // Health bar
  const bw = W * 0.62, bh = 5, bx = (W - bw) / 2, by = 10;
  ctx.fillStyle = 'rgba(255,255,255,.08)';
  rr(bx, by, bw, bh, 2.5); ctx.fill();
  const hw = Math.max(0, (hp / 100) * bw);
  const hcol = hp > 55 ? '#00ff88' : hp > 28 ? '#ffd700' : '#ff2d78';
  const hg = ctx.createLinearGradient(bx, 0, bx + bw, 0);
  hg.addColorStop(0, hcol + '88'); hg.addColorStop(1, hcol);
  ctx.fillStyle = hg; ctx.shadowColor = hcol; ctx.shadowBlur = 7;
  if (hw > 0) { rr(bx, by, hw, bh, 2.5); ctx.fill(); }
  ctx.shadowBlur = 0;

  // Score
  ctx.font = `bold ${Math.round(Math.min(W * 0.058, 34))}px Orbitron,monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 12;
  ctx.fillText(score.toLocaleString(), W / 2, 42); ctx.shadowBlur = 0;

  // Combo
  if (combo > 1) {
    const big = combo >= 100;
    const sz = Math.min(W * 0.04 + (big ? W * 0.008 : 0), 26);
    ctx.font = `bold ${Math.round(sz)}px Orbitron,monospace`;
    let cc = 'rgba(255,255,255,.9)', cb = 8;
    if      (combo >= 50) { cc = `hsl(${(t / 8) % 360},100%,65%)`; cb = 28; }
    else if (combo >= 20) { cc = '#ffd700'; cb = 18; }
    ctx.fillStyle = cc; ctx.shadowColor = cc; ctx.shadowBlur = cb;
    ctx.fillText(`${combo}\u00d7 COMBO`, W / 2, 67); ctx.shadowBlur = 0;
  }

  // Multiplier badge
  const mult = Math.max(1, 1 + Math.floor(combo / 20));
  if (mult > 1) {
    ctx.font = `${Math.round(W * 0.029)}px Orbitron`; ctx.textAlign = 'right';
    ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10;
    ctx.fillText(`\u00d7${mult}`, W - 10, 28); ctx.shadowBlur = 0;
  }

  // Countdown (last 10 s)
  const tl = Math.max(0, SONG - elapsed);
  if (tl < 11000) {
    const ts = Math.ceil(tl / 1000);
    ctx.font = `bold ${Math.round(W * 0.034)}px Orbitron`;
    ctx.textAlign = 'left';
    ctx.fillStyle = ts <= 5 ? '#ff2d78' : 'rgba(255,255,255,.5)';
    ctx.fillText(`${ts}`, 10, 30);
  }

  // Diff label
  ctx.font = `${Math.round(W * 0.02)}px Orbitron`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = `rgba(${DC[diff].col.slice(1).match(/../g).map(x=>parseInt(x,16)).join(',')},0.5)`;
  ctx.fillText(DC[diff].lbl, 10, H - 12);
}

/* ── Pause overlay ── */
function drawPause(t) {
  ctx.fillStyle = 'rgba(0,0,0,.72)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${Math.round(W * 0.1)}px Orbitron,monospace`;
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 25;
  ctx.fillText('ПАУЗА', W / 2, H / 2 - H * 0.06); ctx.shadowBlur = 0;
  const pp = 0.88 + Math.sin(t / 500) * 0.12;
  ctx.font = `bold ${Math.round(W * 0.038 * pp)}px Orbitron`;
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  ctx.fillText('ТАП / ESC — продолжить', W / 2, H / 2 + H * 0.06);
}

/* ═══════════════════════════════════════════════════════════════
   MENU
═══════════════════════════════════════════════════════════════ */

function drawMenu(t) {
  drawBG(t);
  const cx = W / 2;
  const ps  = 0.96 + Math.sin(t / 680) * 0.04;
  const bph = ((t % BEAT) / BEAT);
  const bpu = Math.max(0, 1 - bph * 3.5);

  ctx.save(); ctx.translate(cx, H * 0.19); ctx.scale(ps, ps);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.font = `900 ${Math.round(W * 0.13)}px Orbitron,monospace`;
  for (let i = 3; i > 0; i--) {
    ctx.fillStyle = `rgba(255,45,120,${0.11 * i})`;
    ctx.shadowColor = '#ff2d78'; ctx.shadowBlur = i * 14;
    ctx.fillText('TAP', 0, 0);
  }
  ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.fillText('TAP', 0, 0);

  ctx.translate(0, W * 0.147);
  ctx.font = `900 ${Math.round(W * 0.115)}px Orbitron,monospace`;
  for (let i = 3; i > 0; i--) {
    ctx.fillStyle = `rgba(0,212,255,${0.11 * i})`;
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = i * 14;
    ctx.fillText('BEATS', 0, 0);
  }
  ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.fillText('BEATS', 0, 0);
  ctx.restore();

  ctx.font = `${Math.round(W * 0.026)}px Nunito,sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,.4)'; ctx.textAlign = 'center';
  ctx.fillText(`РИТМ-ИГРА  •  ${BPM} BPM  •  ТАПАЙ В ТАКТ`, cx, H * 0.44);

  // Difficulty buttons
  const dks = ['easy', 'norm', 'hard'], dls = ['ЛЕГКО', 'НОРМАЛЬНО', 'СЛОЖНО'];
  const bw  = Math.min(W * 0.25, 112), bh = 44;
  const tw  = dks.length * bw + (dks.length - 1) * 10;
  const bsx = (W - tw) / 2, bsy = H * 0.52;

  dks.forEach((dk, i) => {
    const bx = bsx + i * (bw + 10), col = DC[dk].col, active = diff === dk;
    ctx.shadowColor = col; ctx.shadowBlur = active ? 16 : 5;
    ctx.strokeStyle = active ? col : col + '55'; ctx.lineWidth = active ? 2 : 1;
    rr(bx, bsy, bw, bh, 7); ctx.stroke();
    if (active) { ctx.fillStyle = col + '1a'; rr(bx, bsy, bw, bh, 7); ctx.fill(); }
    ctx.shadowBlur = 0;
    ctx.font = `bold ${Math.round(W * 0.025)}px Orbitron`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = active ? '#fff' : col + 'bb';
    ctx.fillText(dls[i], bx + bw / 2, bsy + bh / 2);
    mBtns[dk] = { x: bx, y: bsy, w: bw, h: bh };
  });

  // Beat pulse indicator
  const dotY = H * 0.66;
  for (let l = 0; l < 3; l++) {
    const col = LC[l];
    ctx.beginPath(); ctx.arc(LX[l], dotY, 4 + bpu * 4, 0, Math.PI * 2);
    ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 6 + bpu * 10;
    ctx.fill(); ctx.shadowBlur = 0;
  }
  ctx.font = `${Math.round(W * 0.021)}px Orbitron`;
  ctx.fillStyle = `rgba(255,255,255,${0.2 + bpu * 0.5})`;
  ctx.textAlign = 'center';
  ctx.fillText('♩ BEAT', cx, dotY + 20);

  // Start button
  const sp = 0.88 + Math.sin(t / 520) * 0.12;
  ctx.font = `bold ${Math.round(W * 0.046 * sp)}px Orbitron`;
  ctx.fillStyle = '#fff'; ctx.shadowColor = DC[diff].col; ctx.shadowBlur = 22;
  ctx.fillText('[ НАЧАТЬ ]', cx, H * 0.76); ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,.25)';
  ctx.font = `${Math.round(W * 0.022)}px Nunito`;
  ctx.fillText('нажми или тапни по лану  •  A S D на клавиатуре', cx, H * 0.82);

  // Best score
  if (best[diff] > 0) {
    ctx.font = `${Math.round(W * 0.022)}px Orbitron`;
    ctx.fillStyle = 'rgba(255,215,0,.6)';
    ctx.fillText(`\u2605 РЕКОРД  ${best[diff].toLocaleString()}`, cx, H * 0.88);
  }

  // Lane preview
  for (let l = 0; l < 3; l++) {
    const col = LC[l];
    ctx.beginPath(); ctx.arc(LX[l], H * 0.93, NR * 0.6 + bpu * 3, 0, Math.PI * 2);
    ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.shadowColor = col; ctx.shadowBlur = 8 + bpu * 12;
    ctx.stroke(); ctx.shadowBlur = 0;
  }
  ctx.font = `${Math.round(W * 0.02)}px Orbitron`;
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('A', LX[0], H * 0.975);
  ctx.fillText('S', LX[1], H * 0.975);
  ctx.fillText('D', LX[2], H * 0.975);
}

function menuClick(x, y) {
  for (const [d, r] of Object.entries(mBtns)) {
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) { diff = d; return; }
  }
  if (y > H * 0.64) initGame(diff);
}

/* ═══════════════════════════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════════════════════════ */

function drawResults(t) {
  drawBG(t);
  const cx = W / 2;
  const tot = perf + grt + gd + miss;
  const acc = tot > 0 ? Math.round(((perf * 1) + (grt * 0.67) + (gd * 0.33)) / tot * 100) : 0;

  let grade, gcol;
  if      (acc >= 95) { grade = 'S'; gcol = '#ffd700'; }
  else if (acc >= 85) { grade = 'A'; gcol = '#00ff88'; }
  else if (acc >= 70) { grade = 'B'; gcol = '#00d4ff'; }
  else if (acc >= 50) { grade = 'C'; gcol = '#9945ff'; }
  else                { grade = 'D'; gcol = '#ff2d78'; }

  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = `bold ${Math.round(W * 0.06)}px Orbitron`;
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.fillText('РЕЗУЛЬТАТ', cx, H * 0.11);

  // Grade (animated)
  const gs = 0.95 + Math.sin(t / 640) * 0.05;
  ctx.save(); ctx.translate(cx, H * 0.31); ctx.scale(gs, gs);
  ctx.font = `900 ${Math.round(W * 0.23)}px Orbitron`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = gcol; ctx.shadowColor = gcol; ctx.shadowBlur = 36;
  ctx.fillText(grade, 0, 0); ctx.restore(); ctx.shadowBlur = 0;

  // Stats
  const rows = [
    ['СЧЁТ',       score.toLocaleString(), '#fff'   ],
    ['ТОЧНОСТЬ',   acc + '%',              gcol     ],
    ['МАКС. КОМБО',maxCombo + '\u00d7',   '#00d4ff'],
  ];
  rows.forEach(([lbl, val, col], i) => {
    const y = H * 0.47 + i * H * 0.1;
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.font = `${Math.round(W * 0.025)}px Orbitron`;
    ctx.fillStyle = 'rgba(255,255,255,.42)';
    ctx.fillText(lbl, cx, y);
    ctx.font = `bold ${Math.round(W * 0.057)}px Orbitron`;
    ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 10;
    ctx.fillText(val, cx, y + H * 0.043); ctx.shadowBlur = 0;
  });

  // Breakdown
  ctx.font = `${Math.round(W * 0.02)}px Nunito`;
  ctx.fillStyle = 'rgba(255,255,255,.38)';
  ctx.fillText(`PERFECT ${perf}   GREAT ${grt}   GOOD ${gd}   MISS ${miss}`, cx, H * 0.83);

  // Restart prompt
  const rp = 0.9 + Math.sin(t / 450) * 0.1;
  ctx.font = `bold ${Math.round(W * 0.042 * rp)}px Orbitron`;
  ctx.fillStyle = '#fff'; ctx.shadowColor = DC[diff].col; ctx.shadowBlur = 18;
  ctx.fillText('[ ТАП — ЗАНОВО ]', cx, H * 0.92); ctx.shadowBlur = 0;

  // Best score ribbon
  if (best[diff] > 0) {
    ctx.font = `${Math.round(W * 0.02)}px Orbitron`;
    ctx.fillStyle = 'rgba(255,215,0,.55)';
    ctx.fillText(`\u2605 РЕКОРД: ${best[diff].toLocaleString()}`, cx, H * 0.97);
  }
}

/* ═══════════════════════════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════════════════════════ */

function loop(t) {
  requestAnimationFrame(loop);

  // Screen shake
  let ox = 0, oy = 0;
  if (shake > 0) {
    ox = (Math.random() - 0.5) * shake * 2.5;
    oy = (Math.random() - 0.5) * shake * 2.5;
    shake *= 0.72; if (shake < 0.3) shake = 0;
  }
  ctx.save();
  if (ox || oy) ctx.translate(ox, oy);

  if (st === 'menu') {
    drawMenu(t);
  } else if (st === 'play') {
    if (t - gStart > SONG) { saveBest(); st = 'results'; }
    spawnNotes(t); updNotes(t); updParts(); updFloats();
    drawBG(t); drawLanes(); drawHitZones(t);
    drawNotes(); drawParts(); drawFloats(); drawHUD(t);
  } else if (st === 'pause') {
    drawBG(t); drawLanes(); drawHitZones(t);
    drawNotes(); drawParts(); drawFloats(); drawHUD(t);
    drawPause(t);
  } else if (st === 'results') {
    updParts(); drawResults(t);
  }

  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   INPUT
═══════════════════════════════════════════════════════════════ */

c.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (st === 'menu')    menuClick(t.clientX, t.clientY);
  else if (st === 'play' || st === 'pause') tap(Math.min(2, Math.floor(t.clientX / (W / 3))));
  else if (st === 'results') { saveBest(); st = 'menu'; }
}, { passive: false });

c.addEventListener('mousedown', e => {
  if (st === 'menu')    menuClick(e.clientX, e.clientY);
  else if (st === 'play' || st === 'pause') tap(Math.min(2, Math.floor(e.clientX / (W / 3))));
  else if (st === 'results') { saveBest(); st = 'menu'; }
});

document.addEventListener('keydown', e => {
  const km = { a:0, ArrowLeft:0, '1':0, s:1, ArrowDown:1, '2':1, d:2, ArrowRight:2, '3':2 };
  if (km[e.key] !== undefined) {
    if (st === 'play' || st === 'pause') { e.preventDefault(); tap(km[e.key]); }
  }
  if (e.key === 'Escape') {
    if      (st === 'play')    pause();
    else if (st === 'pause')   resume();
    else if (st === 'results') { saveBest(); st = 'menu'; }
  }
  if ((e.key === ' ' || e.key === 'Enter') && st === 'menu')    { e.preventDefault(); initGame(diff); }
  if ((e.key === ' ' || e.key === 'Enter') && st === 'results') { e.preventDefault(); saveBest(); st = 'menu'; }
});

/* ── Boot ── */
requestAnimationFrame(loop);
</script>
</body>
